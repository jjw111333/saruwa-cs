<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사루와 CS 매니저</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F7F6F2;--surface:#fff;--border:#E2DDD5;--border2:#CCC8BF;
  --text:#1A1814;--text2:#6B665E;--text3:#9E9890;
  --accent:#2D5A3D;--accent-light:#E8F0EB;
  --purple-soft:#F5EEF8;--purple:#884EA0;
  --sans:'Noto Sans KR',sans-serif;--mono:'DM Mono',monospace;
  --radius:10px;--radius-sm:6px;
  --shadow:0 2px 12px rgba(0,0,0,0.06);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;}
.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh;}

/* Sidebar */
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sidebar-head{padding:20px;border-bottom:1px solid var(--border);}
.logo{font-size:13px;font-weight:700;letter-spacing:.12em;color:var(--accent);text-transform:uppercase;}
.logo-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:14px 20px;border-bottom:1px solid var(--border);}
.stat-card{background:var(--bg);border-radius:var(--radius-sm);padding:10px 12px;}
.stat-num{font-size:20px;font-weight:700;font-family:var(--mono);}
.stat-lbl{font-size:10px;color:var(--text3);margin-top:2px;}
.add-btn{margin:12px 20px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:10px 16px;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:var(--sans);transition:opacity .15s;width:calc(100% - 40px);}
.add-btn:hover{opacity:.85;}
.filter-section{padding:0 20px 12px;}
.filter-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;margin-top:14px;display:block;}
.tag-grid{display:flex;flex-wrap:wrap;gap:5px;}
.tag{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid var(--border);background:var(--bg);cursor:pointer;color:var(--text2);transition:all .15s;font-weight:500;}
.tag.active{background:var(--accent-light);color:var(--accent);border-color:var(--accent);}
.p-btn,.s-btn{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:var(--bg);cursor:pointer;color:var(--text2);font-family:var(--sans);transition:all .15s;}
.p-btn.active,.s-btn.active{background:var(--accent-light);color:var(--accent);border-color:var(--accent);}
.priority-grid,.status-grid{display:flex;gap:5px;flex-wrap:wrap;}

/* Main */
.main{display:flex;flex-direction:column;}
.nav-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--surface);padding:0 24px;position:sticky;top:0;z-index:10;}
.nav-tab{font-size:13px;font-weight:500;padding:12px 16px;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--sans);white-space:nowrap;}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:49px;z-index:9;}
.search-wrap{flex:1;position:relative;}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text3);}
.search-wrap input{width:100%;padding:8px 14px 8px 32px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;color:var(--text);background:var(--bg);font-family:var(--sans);outline:none;transition:border .15s;}
.search-wrap input:focus{border-color:var(--accent);}
.sort-select{padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;color:var(--text2);background:var(--bg);font-family:var(--sans);outline:none;cursor:pointer;}
.content{flex:1;padding:16px 24px;}
.result-info{font-size:12px;color:var(--text3);margin-bottom:10px;}

/* Cards */
.case-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;transition:border-color .15s,box-shadow .15s;cursor:pointer;}
.case-card:hover{border-color:var(--border2);box-shadow:var(--shadow);}
.case-card.expanded{border-color:var(--accent);}
.card-head{padding:12px 16px;display:flex;align-items:flex-start;gap:10px;}
.card-left{flex:1;min-width:0;}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px;}
.card-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;}
.card-tag.상품문제{background:#FDEDEC;color:#C0392B;}
.card-tag.배송문제{background:#EBF5FB;color:#1A5276;}
.card-tag.내부업무{background:#FDF2E9;color:#784212;}
.card-tag.일반문의{background:#EAFAF1;color:#1E8449;}
.card-tag.주문결제,.card-tag.주문\/결제{background:#F5EEF8;color:#6C3483;}
.card-tag.프리미엄{background:#F5EEF8;color:#884EA0;}
.card-tag.통관{background:#FEFDE7;color:#7D6608;}
.card-tag.기타{background:#EAF2FF;color:#5D6D7E;}
.card-sub-tag{font-size:10px;padding:2px 7px;border-radius:20px;background:#F3F4F6;color:#6B665E;border:1px solid #E2DDD5;}
.card-title{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-meta{display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap;}
.card-date{font-size:11px;color:var(--text3);font-family:var(--mono);}
.card-assignee{font-size:11px;color:var(--text3);}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.priority-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;}
.priority-badge.High{background:#FDEDEC;color:#C0392B;}
.priority-badge.Medium{background:#FEF9E7;color:#7D6608;}
.priority-badge.Low{background:#EAFAF1;color:#1E8449;}
.status-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;}
.status-badge.완료{background:#EAFAF1;color:#1E8449;}
.status-badge.진행중{background:#EBF5FB;color:#1A5276;}
.status-badge.신규{background:#FEF9E7;color:#7D6608;}
.status-badge.보류{background:#F5EEF8;color:#6C3483;}
.expand-icon{font-size:11px;color:var(--text3);transition:transform .2s;}
.case-card.expanded .expand-icon{transform:rotate(180deg);}
.card-body{display:none;border-top:1px solid var(--border);}
.case-card.expanded .card-body{display:block;}
.card-section{padding:12px 16px;border-bottom:1px solid var(--border);}
.card-section:last-child{border-bottom:none;}
.section-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.section-text{font-size:13px;color:var(--text);line-height:1.7;white-space:pre-line;}
.inline-hint{font-size:9px;color:var(--text3);font-weight:400;letter-spacing:0;text-transform:none;}
.inline-textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;color:var(--text);background:var(--bg);font-family:var(--sans);outline:none;resize:vertical;min-height:60px;line-height:1.6;transition:border .15s;}
.inline-textarea:focus{border-color:var(--accent);background:#fff;}
.reply-textarea{min-height:80px;background:var(--accent-light);}
.inline-actions{display:flex;gap:6px;margin-top:6px;}
.inline-save-btn{font-size:11px;font-weight:600;padding:4px 14px;border-radius:var(--radius-sm);border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer;font-family:var(--sans);transition:opacity .15s;}
.inline-save-btn:hover{opacity:.85;}
.inline-save-btn.saved{background:#22C55E;border-color:#22C55E;}
.copy-btn-inline{font-size:11px;font-weight:600;padding:4px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-family:var(--sans);transition:all .15s;}
.copy-btn-inline:hover{border-color:var(--accent);color:var(--accent);}

/* Attributes row */
.card-attrs{padding:10px 16px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:#FAFAF8;}
.attr-item{display:flex;align-items:center;gap:4px;}
.attr-label{font-size:10px;color:var(--text3);font-weight:600;}
.attr-select{font-size:11px;padding:2px 8px;border:1px solid var(--border);border-radius:20px;background:var(--surface);color:var(--text2);font-family:var(--sans);cursor:pointer;outline:none;}
.attr-select:focus{border-color:var(--accent);}

/* Card actions */
.card-actions{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.status-btns{display:flex;gap:6px;}
.card-action-right{display:flex;gap:6px;}
.status-action-btn{font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;border:1px solid;cursor:pointer;font-family:var(--sans);transition:all .15s;}
.status-action-btn.s-신규{background:#FEF9E7;color:#7D6608;border-color:#7D6608;}
.status-action-btn.s-진행중{background:#EBF5FB;color:#1A5276;border-color:#1A5276;}
.status-action-btn.s-보류{background:#F5EEF8;color:#6C3483;border-color:#6C3483;}
.status-action-btn.s-완료{background:#EAFAF1;color:#1E8449;border-color:#1E8449;}
.action-btn{font-size:12px;padding:4px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;font-family:var(--sans);transition:all .15s;}
.action-btn:hover{border-color:var(--border2);color:var(--text);}
.action-btn.delete:hover{border-color:#E74C3C;color:#E74C3C;}

/* AI Panel */
.ai-panel{background:linear-gradient(135deg,#F0FFF4,#E8F5E9);border:1px solid #A5D6A7;border-radius:var(--radius);padding:14px 16px;margin:12px 16px;}
.ai-panel-title{font-size:12px;font-weight:700;color:#2D5A3D;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.ai-btn{font-size:12px;font-weight:600;padding:6px 16px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:#fff;cursor:pointer;font-family:var(--sans);transition:opacity .15s;display:flex;align-items:center;gap:6px;}
.ai-btn:hover{opacity:.85;}
.ai-btn:disabled{opacity:.5;cursor:not-allowed;}
.ai-result{margin-top:12px;background:#fff;border-radius:var(--radius-sm);border:1px solid #C8E6C9;padding:12px;font-size:13px;line-height:1.7;}
.ai-result-section{margin-bottom:10px;}
.ai-result-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;}
.ai-result-value{font-size:13px;color:var(--text);}
.ai-apply-btn{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;border:1px solid var(--accent);background:var(--accent-light);color:var(--accent);cursor:pointer;font-family:var(--sans);margin-left:8px;}
.similar-case{padding:8px 10px;background:#F8F9FA;border-radius:var(--radius-sm);margin-bottom:6px;cursor:pointer;border:1px solid var(--border);transition:border-color .15s;}
.similar-case:hover{border-color:var(--accent);}
.similar-case-title{font-size:12px;font-weight:500;}
.similar-case-tags{display:flex;gap:4px;margin-top:4px;}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:14px;width:700px;max-width:95vw;max-height:90vh;overflow-y:auto;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.15);}
.modal-title{font-size:16px;font-weight:700;margin-bottom:20px;}
.form-row{margin-bottom:14px;}
.form-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block;}
.form-input,.form-textarea,.form-select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;color:var(--text);background:var(--bg);font-family:var(--sans);outline:none;transition:border .15s;}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--accent);}
.form-textarea{min-height:70px;resize:vertical;line-height:1.6;}
.form-row-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.form-row-grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:8px;}
.btn-cancel{padding:9px 18px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text2);font-size:13px;cursor:pointer;font-family:var(--sans);}
.btn-save{padding:9px 22px;border:none;border-radius:var(--radius-sm);background:var(--accent);color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:opacity .15s;}
.btn-save:hover{opacity:.85;}

/* Category Manager */
.cat-manager{padding:20px 24px;}
.cat-manager-title{font-size:16px;font-weight:700;margin-bottom:20px;}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.cat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.cat-card-head{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:#FAFAF8;}
.cat-card-name{font-size:14px;font-weight:700;}
.cat-items{padding:10px 12px;display:flex;flex-direction:column;gap:6px;}
.cat-item{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--bg);border-radius:var(--radius-sm);font-size:13px;}
.cat-item-del{font-size:11px;color:#E74C3C;cursor:pointer;border:none;background:none;padding:0;}
.cat-add-row{display:flex;gap:6px;padding:0 12px 10px;}
.cat-add-input{flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;font-family:var(--sans);outline:none;}
.cat-add-input:focus{border-color:var(--accent);}
.cat-add-btn{padding:6px 12px;border:none;background:var(--accent);color:#fff;border-radius:var(--radius-sm);font-size:12px;cursor:pointer;font-family:var(--sans);}

/* Manual */
.manual-view{padding:20px 24px;}
.manual-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.manual-title{font-size:16px;font-weight:700;}
.manual-hint{font-size:12px;color:var(--text3);}
.manual-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.manual-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.manual-card-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.manual-count{font-size:11px;color:var(--text3);font-family:var(--mono);}
.manual-cases{padding:8px;}
.manual-case-item{padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:background .12s;}
.manual-case-item:hover{background:var(--bg);}
.manual-case-title{font-size:13px;font-weight:500;}
.manual-case-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3);}
.empty-icon{font-size:32px;margin-bottom:10px;}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-head">
      <div class="logo">CS LOG</div>
      <div class="logo-sub">사루와 고객 사례 관리</div>
    </div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-num" id="stat-total">0</div><div class="stat-lbl">전체</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-done">0</div><div class="stat-lbl">완료</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-new">0</div><div class="stat-lbl">신규</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-progress">0</div><div class="stat-lbl">진행중</div></div>
    </div>
    <button class="add-btn" onclick="openModal()">＋ 새 사례 추가</button>
    <div class="filter-section">
      <span class="filter-label">카테고리</span>
      <div class="tag-grid" id="catFilterGrid"></div>
      <span class="filter-label">우선순위</span>
      <div class="priority-grid">
        <button class="p-btn active" data-p="전체" onclick="filterPriority(this)">전체</button>
        <button class="p-btn" data-p="High" onclick="filterPriority(this)">긴급</button>
        <button class="p-btn" data-p="Medium" onclick="filterPriority(this)">보통</button>
        <button class="p-btn" data-p="Low" onclick="filterPriority(this)">낮음</button>
      </div>
      <span class="filter-label">처리 상태</span>
      <div class="status-grid">
        <button class="s-btn active" data-s="전체" onclick="filterStatus(this)">전체</button>
        <button class="s-btn" data-s="신규" onclick="filterStatus(this)">신규</button>
        <button class="s-btn" data-s="진행중" onclick="filterStatus(this)">진행중</button>
        <button class="s-btn" data-s="보류" onclick="filterStatus(this)">보류</button>
        <button class="s-btn" data-s="완료" onclick="filterStatus(this)">완료</button>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="nav-tabs">
      <button class="nav-tab" onclick="switchView('cases',this)">📋 사례 기록</button>
      <button class="nav-tab active" onclick="switchView('status','신규',this)">🆕 신규</button>
      <button class="nav-tab" onclick="switchView('status','진행중',this)">🔄 진행중</button>
      <button class="nav-tab" onclick="switchView('status','보류',this)">⏸ 보류</button>
      <button class="nav-tab" onclick="switchView('status','완료',this)">✅ 완료</button>
      <button class="nav-tab" onclick="switchView('manual',this)">📖 매뉴얼</button>
      <button class="nav-tab" onclick="switchView('catmgr',this)">⚙️ 카테고리</button>
    </div>

    <div id="view-cases">
      <div class="topbar">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="제목, 문의내용, 처리내용, 담당자 검색..." oninput="renderCards()">
        </div>
        <select class="sort-select" id="sortSelect" onchange="renderCards()">
          <option value="newest">최신순</option>
          <option value="oldest">오래된순</option>
          <option value="priority">우선순위순</option>
        </select>
      </div>
      <div class="content">
        <div class="result-info" id="resultInfo"></div>
        <div id="cardList"></div>
      </div>
    </div>

    <div id="view-manual" style="display:none">
      <div class="manual-view">
        <div class="manual-header">
          <div class="manual-title">유형별 대응 매뉴얼</div>
          <div class="manual-hint">사례가 쌓일수록 매뉴얼이 완성돼요</div>
        </div>
        <div class="manual-grid" id="manualGrid"></div>
      </div>
    </div>

    <div id="view-catmgr" style="display:none">
      <div class="cat-manager">
        <div class="cat-manager-title">⚙️ 카테고리 관리</div>
        <div class="cat-grid" id="catMgrGrid"></div>
      </div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title" id="modalTitle">새 CS 사례 추가</div>
    <div class="form-row">
      <label class="form-label">제목 *</label>
      <input class="form-input" id="fTitle" placeholder="예: 상품번호 323692 누락 건">
    </div>
    <div class="form-row-grid" style="margin-bottom:14px">
      <div>
        <label class="form-label">대분류</label>
        <select class="form-select" id="fCat" onchange="updateSubCatOptions()"></select>
      </div>
      <div>
        <label class="form-label">중분류</label>
        <select class="form-select" id="fSubCat"></select>
      </div>
      <div>
        <label class="form-label">귀책</label>
        <select class="form-select" id="fBlame">
          <option value="">선택</option>
          <option value="사루와 귀책">사루와 귀책</option>
          <option value="고객 귀책">고객 귀책</option>
          <option value="출품자(샵측) 귀책">출품자(샵측) 귀책</option>
        </select>
      </div>
    </div>
    <div class="form-row-grid" style="margin-bottom:14px">
      <div>
        <label class="form-label">우선순위</label>
        <select class="form-select" id="fPriority">
          <option value="Medium">Medium (보통)</option>
          <option value="High">High (긴급)</option>
          <option value="Low">Low (낮음)</option>
        </select>
      </div>
      <div>
        <label class="form-label">처리 상태</label>
        <select class="form-select" id="fStatus">
          <option value="신규">신규</option>
          <option value="진행중">진행중</option>
          <option value="보류">보류</option>
          <option value="완료">완료</option>
        </select>
      </div>
      <div>
        <label class="form-label">담당자</label>
        <input class="form-input" id="fAssignee" placeholder="이름 또는 슬랙ID">
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">고객 원문 문의</label>
      <textarea class="form-textarea" id="fInquiry" placeholder="고객 문의 원문"></textarea>
    </div>
    <div class="form-row">
      <label class="form-label">처리 내용 / 메모</label>
      <textarea class="form-textarea" id="fNotes" placeholder="어떻게 처리했는지 기록"></textarea>
    </div>
    <div class="form-row">
      <label class="form-label">답변 정형문</label>
      <textarea class="form-textarea" id="fReply" placeholder="실제 답변 정형문"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveCase()">저장하기</button>
    </div>
  </div>
</div>

<script>
const NOTION_DB = '1a7f4b08518a80c5aaa6d512074b2163';
const PROXY = 'https://saruwa-notion.saruwa-buy.workers.dev';

// 카테고리 구조
let CAT_STRUCTURE = {
  '상품 문제': ['오배송','누락','파손','가품','반송'],
  '배송 문제': ['미도착','지연','배송 확인','분실'],
  '내부 업무': ['입고오류','합포장 실수','출품자 문의','클레임 종결'],
  '일반 문의': ['포장 요청','합포장 문의','상품 문의','견적'],
  '주문/결제': ['취소','환불','결제 확인','옵션 오류'],
  '프리미엄': ['검수','포장 보강','특전 확인'],
  '통관': ['사유서','관세','반입 불가'],
  '기타': ['시스템','공지','교육','기타'],
};

const CAT_CSS_CLASS = {
  '상품 문제':'상품문제','배송 문제':'배송문제','내부 업무':'내부업무',
  '일반 문의':'일반문의','주문/결제':'주문결제','프리미엄':'프리미엄',
  '통관':'통관','기타':'기타'
};

let cases = [];
let activeCat = '전체', activePriority = '전체', activeStatus = '신규';
let editingId = null;

// Load cat structure from localStorage
function loadCatStructure() {
  const saved = localStorage.getItem('saruwa_cat_structure');
  if (saved) CAT_STRUCTURE = JSON.parse(saved);
}
function saveCatStructure() {
  localStorage.setItem('saruwa_cat_structure', JSON.stringify(CAT_STRUCTURE));
}

function showLoading(msg='불러오는 중...') {
  document.getElementById('cardList').innerHTML = `<div class="empty-state"><div class="empty-icon">⏳</div><div>${msg}</div></div>`;
}
function showError(msg) {
  document.getElementById('cardList').innerHTML = `<div class="empty-state"><div class="empty-icon">❌</div><div>${msg}</div></div>`;
}

function notionToCase(page) {
  const p = page.properties;
  const getText = (prop) => prop?.title?.[0]?.plain_text || prop?.rich_text?.[0]?.plain_text || '';
  const getSelect = (prop) => prop?.select?.name || '';
  const getMultiSelect = (prop) => prop?.multi_select?.map(s=>s.name) || [];
  const getDate = (prop) => prop?.date?.start || prop?.created_time?.slice(0,10) || '';
  const statusMap = {'DONE':'완료','Done':'완료','REVIEW':'보류','Review':'보류','In progress':'진행중','new':'신규','New':'신규','NEW':'신규'};
  const raw = getSelect(p['Status']||p['상태'])||'new';
  return {
    id: page.id,
    title: getText(p['Name']||p['name']),
    cat: getSelect(p['Category']||p['카테고리'])||'기타',
    subCat: getText(p['SubCategory']||p['중분류'])||'',
    blame: getText(p['Blame']||p['귀책'])||getSelect(p['Blame'])||'',
    notes: getText(p['Notes']||p['notes']),
    inquiry: getText(p['Original Inquiry']||p['inquiry']),
    reply: getText(p['Reply']||p['reply']),
    priority: getSelect(p['Priority'])||'Medium',
    status: statusMap[raw]||raw,
    assignee: getText(p['Created by'])||getSelect(p['Created by']),
    date: getDate(p['Created time']),
  };
}

async function load() {
  showLoading('노션에서 데이터 불러오는 중...');
  try {
    let allResults = [], cursor;
    do {
      const body = { page_size: 100 };
      if (cursor) body.start_cursor = cursor;
      const res = await fetch(`${PROXY}/v1/databases/${NOTION_DB}/query`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Notion-Version': '2022-06-28' },
        body: JSON.stringify(body)
      });
      if (!res.ok) throw new Error(`API 오류: ${res.status}`);
      const data = await res.json();
      allResults = allResults.concat(data.results);
      cursor = data.has_more ? data.next_cursor : undefined;
    } while (cursor);
    cases = allResults.map(notionToCase).filter(c=>c.title);
    updateStats(); renderCards(); renderCatFilter();
  } catch(e) {
    const cached = localStorage.getItem('saruwa_cs_cache');
    if (cached) { cases = JSON.parse(cached); updateStats(); renderCards(); renderCatFilter(); }
    else showError('노션 연결 실패: ' + e.message);
  }
}

function updateStats() {
  document.getElementById('stat-total').textContent = cases.length;
  document.getElementById('stat-done').textContent = cases.filter(c=>c.status==='완료').length;
  document.getElementById('stat-new').textContent = cases.filter(c=>c.status==='신규').length;
  document.getElementById('stat-progress').textContent = cases.filter(c=>c.status==='진행중').length;
  localStorage.setItem('saruwa_cs_cache', JSON.stringify(cases));
}

function renderCatFilter() {
  const grid = document.getElementById('catFilterGrid');
  const cats = ['전체', ...Object.keys(CAT_STRUCTURE)];
  grid.innerHTML = cats.map(cat => {
    const cls = cat === '전체' ? '' : (CAT_CSS_CLASS[cat]||'기타');
    const isActive = activeCat === cat;
    return `<span class="tag ${cls} ${isActive?'active':''}" onclick="filterCat(this)" data-cat="${cat}">${cat}</span>`;
  }).join('');
}

function filterCat(el) {
  document.querySelectorAll('#catFilterGrid .tag').forEach(t=>t.classList.remove('active'));
  el.classList.add('active'); activeCat = el.dataset.cat; renderCards();
}
function filterPriority(el) {
  document.querySelectorAll('.p-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active'); activePriority = el.dataset.p; renderCards();
}
function filterStatus(el) {
  document.querySelectorAll('.s-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active'); activeStatus = el.dataset.s; renderCards();
}

function renderCards() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;
  let filtered = cases.filter(c => {
    const catOk = activeCat==='전체' || c.cat===activeCat;
    const prioOk = activePriority==='전체' || c.priority===activePriority;
    const statOk = activeStatus==='전체' || c.status===activeStatus;
    const searchOk = !q || [c.title,c.inquiry,c.notes,c.reply,c.assignee||''].join(' ').toLowerCase().includes(q);
    return catOk && prioOk && statOk && searchOk;
  });
  const prioOrder = {High:0,Medium:1,Low:2};
  if (sort==='newest') filtered.sort((a,b)=>b.id.localeCompare(a.id));
  else if (sort==='oldest') filtered.sort((a,b)=>a.id.localeCompare(b.id));
  else filtered.sort((a,b)=>(prioOrder[a.priority]||1)-(prioOrder[b.priority]||1));
  document.getElementById('resultInfo').textContent = `${filtered.length}개 사례`;
  const list = document.getElementById('cardList');
  if (!filtered.length) { list.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div>해당하는 사례가 없어요</div></div>'; return; }
  const catCls = c => CAT_CSS_CLASS[c.cat]||'기타';
  const subCatOptions = c => (CAT_STRUCTURE[c.cat]||[]).map(s=>`<option value="${s}" ${c.subCat===s?'selected':''}>${s}</option>`).join('');
  list.innerHTML = filtered.map(c => `
    <div class="case-card" id="card-${c.id.replace(/-/g,'_')}" onclick="toggleCard('${c.id}')">
      <div class="card-head">
        <div class="card-left">
          <div class="card-tags">
            <span class="card-tag ${catCls(c)}">${c.cat}</span>
            ${c.subCat ? `<span class="card-sub-tag">${c.subCat}</span>` : ''}
            ${c.blame ? `<span class="card-sub-tag">⚖️ ${c.blame}</span>` : ''}
          </div>
          <div class="card-title">${esc(c.title)}</div>
          <div class="card-meta">
            <span class="card-date">${c.date||''}</span>
            ${c.assignee?`<span class="card-assignee">· ${esc(c.assignee)}</span>`:''}
          </div>
        </div>
        <div class="card-right">
          <span class="priority-badge ${c.priority}">${c.priority}</span>
          <span class="status-badge ${c.status}">${c.status}</span>
          <span class="expand-icon">▼</span>
        </div>
      </div>
      <div class="card-body">
        <div class="card-attrs">
          <div class="attr-item">
            <span class="attr-label">중분류</span>
            <select class="attr-select" onclick="event.stopPropagation()" onchange="updateAttr(event,'${c.id}','subCat',this.value)">
              <option value="">선택</option>
              ${subCatOptions(c)}
            </select>
          </div>
          <div class="attr-item">
            <span class="attr-label">귀책</span>
            <select class="attr-select" onclick="event.stopPropagation()" onchange="updateAttr(event,'${c.id}','blame',this.value)">
              <option value="">선택</option>
              <option value="사루와 귀책" ${c.blame==='사루와 귀책'?'selected':''}>사루와 귀책</option>
              <option value="고객 귀책" ${c.blame==='고객 귀책'?'selected':''}>고객 귀책</option>
              <option value="출품자(샵측) 귀책" ${c.blame==='출품자(샵측) 귀책'?'selected':''}>출품자(샵측) 귀책</option>
            </select>
          </div>
          <div class="attr-item">
            <span class="attr-label">우선순위</span>
            <select class="attr-select" onclick="event.stopPropagation()" onchange="updateAttr(event,'${c.id}','priority',this.value)">
              <option value="High" ${c.priority==='High'?'selected':''}>긴급</option>
              <option value="Medium" ${c.priority==='Medium'?'selected':''}>보통</option>
              <option value="Low" ${c.priority==='Low'?'selected':''}>낮음</option>
            </select>
          </div>
        </div>

        ${c.inquiry ? `<div class="card-section"><div class="section-label">고객 원문 문의</div><div class="section-text">${esc(c.inquiry)}</div></div>` : ''}

        <div class="card-section">
          <div class="section-label">처리 내용 / 메모 <span class="inline-hint">편집 후 저장</span></div>
          <textarea class="inline-textarea" id="notes-${c.id}" onclick="event.stopPropagation()" placeholder="처리 내용을 입력하세요...">${c.notes||''}</textarea>
          <div class="inline-actions"><button class="inline-save-btn" onclick="saveInline(event,'${c.id}','notes')">저장</button></div>
        </div>

        <div class="card-section">
          <div class="section-label">답변 정형문 <span class="inline-hint">편집 후 저장 · 복사 가능</span></div>
          <textarea class="inline-textarea reply-textarea" id="reply-${c.id}" onclick="event.stopPropagation()" placeholder="정형문을 입력하세요.">${c.reply||''}</textarea>
          <div class="inline-actions">
            <button class="inline-save-btn" onclick="saveInline(event,'${c.id}','reply')">저장</button>
            <button class="copy-btn-inline" onclick="copyReply(event,'${c.id}')">📋 복사</button>
          </div>
        </div>

        <!-- AI 패널 -->
        <div class="ai-panel">
          <div class="ai-panel-title">🤖 AI 어시스턴트</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="ai-btn" onclick="aiAnalyze(event,'${c.id}')">✨ 속성 자동 추천</button>
            <button class="ai-btn" onclick="aiFindSimilar(event,'${c.id}')">🔍 비슷한 사례 찾기</button>
            <button class="ai-btn" onclick="aiDraftReply(event,'${c.id}')">✍️ 답변 초안 작성</button>
          </div>
          <div class="ai-result" id="ai-result-${c.id.replace(/-/g,'_')}" style="display:none"></div>
        </div>

        <div class="card-actions">
          <div class="status-btns">
            ${c.status!=='신규'?`<button class="status-action-btn s-신규" onclick="changeStatus(event,'${c.id}','신규')">신규</button>`:''}
            ${c.status!=='진행중'?`<button class="status-action-btn s-진행중" onclick="changeStatus(event,'${c.id}','진행중')">진행중</button>`:''}
            ${c.status!=='보류'?`<button class="status-action-btn s-보류" onclick="changeStatus(event,'${c.id}','보류')">보류</button>`:''}
            ${c.status!=='완료'?`<button class="status-action-btn s-완료" onclick="changeStatus(event,'${c.id}','완료')">✅ 완료</button>`:''}
          </div>
          <div class="card-action-right">
            <button class="action-btn delete" onclick="deleteCase(event,'${c.id}')">삭제</button>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function toggleCard(id) {
  document.getElementById('card-'+id.replace(/-/g,'_')).classList.toggle('expanded');
}

function copyReply(e,id) {
  e.stopPropagation();
  const c = cases.find(x=>x.id===id);
  const text = document.getElementById(`reply-${id}`)?.value || c?.reply || '';
  navigator.clipboard.writeText(text).then(()=>{
    const btn = e.target; btn.textContent='복사됨 ✓';
    setTimeout(()=>btn.textContent='📋 복사', 2000);
  });
}

// 속성 인라인 변경
async function updateAttr(e, id, field, value) {
  e.stopPropagation();
  const idx = cases.findIndex(c=>c.id===id);
  if (idx>-1) cases[idx][field] = value;
  updateStats();
  // 노션에는 Notes/Reply만 rich_text로 저장 가능, 나머지는 로컬만
  // (노션 커스텀 필드 추가 시 연동 가능)
}

async function saveInline(e, id, field) {
  e.stopPropagation();
  const btn = e.target;
  const textarea = document.getElementById(`${field}-${id}`);
  const value = textarea?.value?.trim() || '';
  btn.textContent='저장중...'; btn.disabled=true;
  const notionFieldMap = {notes:'Notes', reply:'Reply'};
  try {
    await fetch(`${PROXY}/v1/pages/${id}`, {
      method:'PATCH',
      headers:{'Content-Type':'application/json','Notion-Version':'2022-06-28'},
      body: JSON.stringify({properties:{[notionFieldMap[field]]:{rich_text:[{text:{content:value}}]}}})
    });
  } catch(err) { console.warn('노션 저장 실패', err); }
  const idx = cases.findIndex(c=>c.id===id);
  if (idx>-1) cases[idx][field] = value;
  updateStats();
  btn.textContent='저장됨 ✓'; btn.classList.add('saved');
  setTimeout(()=>{ btn.textContent='저장'; btn.classList.remove('saved'); btn.disabled=false; }, 2000);
}

async function changeStatus(e, id, newStatus) {
  e.stopPropagation();
  const btn = e.target;
  btn.textContent='저장중...'; btn.disabled=true;
  const notionStatusMap = {'신규':'new','진행중':'In progress','보류':'REVIEW','완료':'DONE'};
  try {
    await fetch(`${PROXY}/v1/pages/${id}`, {
      method:'PATCH',
      headers:{'Content-Type':'application/json','Notion-Version':'2022-06-28'},
      body: JSON.stringify({properties:{'Status':{select:{name:notionStatusMap[newStatus]}}}})
    });
  } catch(err) { console.warn('노션 상태 변경 실패', err); }
  const idx = cases.findIndex(c=>c.id===id);
  if (idx>-1) cases[idx].status = newStatus;
  updateStats(); renderCards();
}

async function deleteCase(e, id) {
  e.stopPropagation();
  if (!confirm('이 사례를 삭제할까요?')) return;
  try {
    await fetch(`${PROXY}/v1/pages/${id}`, {
      method:'PATCH',
      headers:{'Content-Type':'application/json','Notion-Version':'2022-06-28'},
      body: JSON.stringify({archived:true})
    });
  } catch(err) { console.warn('노션 삭제 실패', err); }
  cases = cases.filter(c=>c.id!==id);
  updateStats(); renderCards();
}

// ===== AI 기능 =====
const CLAUDE_MODEL = 'claude-sonnet-4-20250514';

async function callClaude(prompt) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: CLAUDE_MODEL,
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  const data = await res.json();
  return data.content?.[0]?.text || '';
}

function getAiResultEl(id) {
  const el = document.getElementById(`ai-result-${id.replace(/-/g,'_')}`);
  el.style.display = 'block';
  return el;
}

async function aiAnalyze(e, id) {
  e.stopPropagation();
  const c = cases.find(x=>x.id===id);
  const el = getAiResultEl(id);
  el.innerHTML = '🤖 분석 중...';
  const cats = Object.entries(CAT_STRUCTURE).map(([cat, subs]) => `${cat}: ${subs.join(', ')}`).join('\n');
  const prompt = `사루와 구매대행 CS 케이스를 분석해서 아래 형식으로만 답해줘. 다른 말 하지 마.

케이스 제목: ${c.title}
고객 문의: ${c.inquiry || '없음'}
처리 내용: ${c.notes || '없음'}

카테고리 구조:
${cats}

귀책 옵션: 사루와 귀책 / 고객 귀책 / 출품자(샵측) 귀책

아래 JSON 형식으로만 답해:
{"대분류":"","중분류":"","귀책":"","우선순위":"High/Medium/Low","이유":"한 줄 설명"}`;

  try {
    const result = await callClaude(prompt);
    const json = JSON.parse(result.replace(/```json|```/g,'').trim());
    el.innerHTML = `
      <div class="ai-result-section">
        <div class="ai-result-label">추천 분류</div>
        <div class="ai-result-value">
          <strong>${json.대분류}</strong> > ${json.중분류}
          <button class="ai-apply-btn" onclick="applyAiCat('${id}','${json.대분류}','${json.중분류}')">적용</button>
        </div>
      </div>
      <div class="ai-result-section">
        <div class="ai-result-label">귀책</div>
        <div class="ai-result-value">${json.귀책}
          <button class="ai-apply-btn" onclick="applyAiBlame('${id}','${json.귀책}')">적용</button>
        </div>
      </div>
      <div class="ai-result-section">
        <div class="ai-result-label">우선순위</div>
        <div class="ai-result-value">${json.우선순위}</div>
      </div>
      <div class="ai-result-section">
        <div class="ai-result-label">판단 이유</div>
        <div class="ai-result-value">${json.이유}</div>
      </div>`;
  } catch(err) {
    el.innerHTML = '분석 실패: ' + err.message;
  }
}

async function aiFindSimilar(e, id) {
  e.stopPropagation();
  const c = cases.find(x=>x.id===id);
  const el = getAiResultEl(id);
  el.innerHTML = '🔍 유사 사례 검색 중...';

  // 같은 대분류에서 완료된 것들 5개까지 샘플
  const samples = cases.filter(x=>x.id!==id && x.status==='완료' && x.cat===c.cat).slice(0,20);
  if (!samples.length) { el.innerHTML = '비교할 완료 사례가 없어요.'; return; }

  const sampleText = samples.map((s,i) => `[${i}] 제목: ${s.title} | 처리: ${s.notes?.slice(0,80)||''}`).join('\n');
  const prompt = `아래 CS 케이스와 가장 비슷한 사례 번호 3개를 골라줘. 번호만 콤마로 구분해서 답해. 다른 말 하지 마.

현재 케이스: ${c.title} / ${c.inquiry?.slice(0,100)||''}

과거 사례들:
${sampleText}`;

  try {
    const result = await callClaude(prompt);
    const nums = result.match(/\d+/g)?.map(Number).filter(n=>n<samples.length).slice(0,3) || [];
    if (!nums.length) { el.innerHTML = '유사한 사례를 찾지 못했어요.'; return; }
    const similar = nums.map(n=>samples[n]);
    el.innerHTML = `<div class="ai-result-label" style="margin-bottom:8px">비슷한 사례 ${similar.length}건</div>` +
      similar.map(s=>`
        <div class="similar-case" onclick="scrollToCase('${s.id}')">
          <div class="similar-case-title">${esc(s.title)}</div>
          <div class="similar-case-tags">
            <span class="card-sub-tag">${s.cat}</span>
            ${s.subCat?`<span class="card-sub-tag">${s.subCat}</span>`:''}
            ${s.blame?`<span class="card-sub-tag">${s.blame}</span>`:''}
          </div>
          ${s.notes?`<div style="font-size:11px;color:var(--text2);margin-top:4px">${esc(s.notes.slice(0,80))}...</div>`:''}
        </div>`).join('');
  } catch(err) {
    el.innerHTML = '검색 실패: ' + err.message;
  }
}

async function aiDraftReply(e, id) {
  e.stopPropagation();
  const c = cases.find(x=>x.id===id);
  const el = getAiResultEl(id);
  el.innerHTML = '✍️ 답변 초안 작성 중...';

  // 같은 카테고리 완료 사례의 정형문 참고
  const refs = cases.filter(x=>x.id!==id&&x.status==='완료'&&x.cat===c.cat&&x.reply).slice(0,3);
  const refText = refs.map(r=>`참고 정형문: ${r.reply?.slice(0,150)}`).join('\n');

  const prompt = `사루와 일본 구매대행 CS 담당자로서 아래 고객 문의에 대한 답변 정형문을 작성해줘.
정중하고 친절하게, 사루와 특성에 맞게 작성해. 답변 정형문만 작성해, 다른 설명 하지 마.

고객 문의: ${c.inquiry||c.title}
카테고리: ${c.cat} > ${c.subCat||''}
귀책: ${c.blame||'미정'}
처리 내용: ${c.notes||'없음'}

${refText}`;

  try {
    const result = await callClaude(prompt);
    el.innerHTML = `
      <div class="ai-result-label" style="margin-bottom:8px">AI 답변 초안</div>
      <div style="white-space:pre-line;font-size:13px;line-height:1.7">${esc(result)}</div>
      <div style="margin-top:10px">
        <button class="ai-apply-btn" style="font-size:12px;padding:5px 14px" onclick="applyAiReply('${id}',this)">정형문에 적용</button>
      </div>`;
    el._aiReply = result;
  } catch(err) {
    el.innerHTML = '작성 실패: ' + err.message;
  }
}

function applyAiCat(id, cat, subCat) {
  const idx = cases.findIndex(c=>c.id===id);
  if (idx>-1) { cases[idx].cat = cat; cases[idx].subCat = subCat; }
  updateStats(); renderCards();
}
function applyAiBlame(id, blame) {
  const idx = cases.findIndex(c=>c.id===id);
  if (idx>-1) cases[idx].blame = blame;
  updateStats(); renderCards();
}
function applyAiReply(id, btn) {
  const el = document.getElementById(`reply-${id}`);
  const aiEl = document.getElementById(`ai-result-${id.replace(/-/g,'_')}`);
  if (el && aiEl._aiReply) { el.value = aiEl._aiReply; }
}
function scrollToCase(id) {
  activeStatus = '전체';
  document.querySelectorAll('.s-btn').forEach(b=>{ if(b.dataset.s==='전체') b.classList.add('active'); else b.classList.remove('active'); });
  renderCards();
  setTimeout(()=>{
    const el = document.getElementById('card-'+id.replace(/-/g,'_'));
    if (el) { el.scrollIntoView({behavior:'smooth',block:'center'}); el.classList.add('expanded'); }
  }, 200);
}

// Modal
function openModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '새 CS 사례 추가';
  ['fTitle','fInquiry','fNotes','fReply','fAssignee'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fPriority').value = 'Medium';
  document.getElementById('fStatus').value = '신규';
  document.getElementById('fBlame').value = '';
  populateCatSelect();
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalOutside(e) { if (e.target===document.getElementById('modalOverlay')) closeModal(); }

function populateCatSelect() {
  const sel = document.getElementById('fCat');
  sel.innerHTML = Object.keys(CAT_STRUCTURE).map(c=>`<option value="${c}">${c}</option>`).join('');
  updateSubCatOptions();
}
function updateSubCatOptions() {
  const cat = document.getElementById('fCat').value;
  const subs = CAT_STRUCTURE[cat] || [];
  document.getElementById('fSubCat').innerHTML = `<option value="">선택</option>` + subs.map(s=>`<option value="${s}">${s}</option>`).join('');
}

async function saveCase() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { alert('제목은 필수입니다.'); return; }
  const data = {
    title, cat: document.getElementById('fCat').value,
    subCat: document.getElementById('fSubCat').value,
    blame: document.getElementById('fBlame').value,
    inquiry: document.getElementById('fInquiry').value.trim(),
    notes: document.getElementById('fNotes').value.trim(),
    reply: document.getElementById('fReply').value.trim(),
    priority: document.getElementById('fPriority').value,
    status: document.getElementById('fStatus').value,
    assignee: document.getElementById('fAssignee').value.trim(),
    date: new Date().toISOString().slice(0,10),
  };
  const btn = document.querySelector('.btn-save');
  btn.textContent = '저장 중...'; btn.disabled = true;
  const notionStatusMap = {'신규':'new','진행중':'In progress','보류':'REVIEW','완료':'DONE'};
  try {
    const res = await fetch(`${PROXY}/v1/pages`, {
      method: 'POST',
      headers: {'Content-Type':'application/json','Notion-Version':'2022-06-28'},
      body: JSON.stringify({
        parent: {database_id: NOTION_DB},
        properties: {
          'Name': {title:[{text:{content:data.title}}]},
          'Category': {select:{name:data.cat}},
          'Notes': {rich_text:[{text:{content:data.notes}}]},
          'Original Inquiry': {rich_text:[{text:{content:data.inquiry}}]},
          'Reply': {rich_text:[{text:{content:data.reply}}]},
          'Priority': {select:{name:data.priority}},
          'Status': {select:{name:notionStatusMap[data.status]||'new'}},
        }
      })
    });
    const page = await res.json();
    cases.unshift({...data, id: page.id});
  } catch(err) {
    cases.unshift({...data, id: 'local-'+Date.now()});
  }
  closeModal(); updateStats(); renderCards();
  btn.textContent = '저장하기'; btn.disabled = false;
}

// Manual
function renderManual() {
  const grid = document.getElementById('manualGrid');
  const CAT_COLORS = {'상품 문제':'#C0392B','배송 문제':'#1A5276','내부 업무':'#784212','일반 문의':'#1E8449','주문/결제':'#6C3483','프리미엄':'#884EA0','통관':'#7D6608','기타':'#5D6D7E'};
  grid.innerHTML = Object.keys(CAT_STRUCTURE).map(cat => {
    const catCases = cases.filter(c=>c.cat===cat&&c.status==='완료');
    const color = CAT_COLORS[cat]||'#5D6D7E';
    const items = catCases.length ? catCases.slice(0,5).map(c=>`
      <div class="manual-case-item" onclick="scrollToCase('${c.id}')">
        <div class="manual-case-title">${esc(c.title)}</div>
        ${c.subCat||c.blame?`<div class="manual-case-sub">${[c.subCat,c.blame].filter(Boolean).join(' · ')}</div>`:''}
      </div>`).join('') : `<div style="font-size:12px;color:var(--text3);padding:12px;text-align:center">완료된 사례가 없어요</div>`;
    return `
      <div class="manual-card">
        <div class="manual-card-head">
          <span style="font-size:13px;font-weight:700;color:${color}">${cat}</span>
          <span class="manual-count">${catCases.length}건</span>
        </div>
        <div class="manual-cases">${items}</div>
        ${catCases.length>5?`<div style="font-size:11px;color:var(--text3);text-align:center;padding:8px">+${catCases.length-5}건 더 있어요</div>`:''}
      </div>`;
  }).join('');
}

// Category Manager
function renderCatMgr() {
  const grid = document.getElementById('catMgrGrid');
  grid.innerHTML = Object.entries(CAT_STRUCTURE).map(([cat, subs]) => `
    <div class="cat-card">
      <div class="cat-card-head">
        <span class="cat-card-name">${cat}</span>
        <span style="font-size:11px;color:var(--text3)">${subs.length}개</span>
      </div>
      <div class="cat-items">
        ${subs.map(sub=>`
          <div class="cat-item">
            <span>${sub}</span>
            <button class="cat-item-del" onclick="deleteSubCat('${cat}','${sub}')">✕</button>
          </div>`).join('')}
      </div>
      <div class="cat-add-row">
        <input class="cat-add-input" id="catinput-${cat.replace(/\//g,'-')}" placeholder="중분류 추가...">
        <button class="cat-add-btn" onclick="addSubCat('${cat}')">추가</button>
      </div>
    </div>`).join('');
}

function addSubCat(cat) {
  const inputId = 'catinput-'+cat.replace(/\//g,'-');
  const val = document.getElementById(inputId)?.value?.trim();
  if (!val) return;
  if (!CAT_STRUCTURE[cat].includes(val)) { CAT_STRUCTURE[cat].push(val); saveCatStructure(); }
  renderCatMgr(); renderCatFilter();
}
function deleteSubCat(cat, sub) {
  CAT_STRUCTURE[cat] = CAT_STRUCTURE[cat].filter(s=>s!==sub);
  saveCatStructure(); renderCatMgr(); renderCatFilter();
}

function switchView(view, statusOrBtn, btnEl) {
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('view-cases').style.display = 'none';
  document.getElementById('view-manual').style.display = 'none';
  document.getElementById('view-catmgr').style.display = 'none';

  if (view==='status') {
    btnEl.classList.add('active');
    activeStatus = statusOrBtn;
    document.getElementById('view-cases').style.display = '';
    renderCards();
  } else if (view==='cases') {
    statusOrBtn.classList.add('active');
    activeStatus = '전체';
    document.getElementById('view-cases').style.display = '';
    renderCards();
  } else if (view==='manual') {
    statusOrBtn.classList.add('active');
    document.getElementById('view-manual').style.display = '';
    renderManual();
  } else if (view==='catmgr') {
    statusOrBtn.classList.add('active');
    document.getElementById('view-catmgr').style.display = '';
    renderCatMgr();
  }
}

loadCatStructure();
load();
</script>
